<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#a90096">
  <title>Ping Pong Social Club</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="index-page">
    <img src="/logo.png" alt="PPSC Logo" class="index-logo">
    <h1 class="index-title">Ping Pong <span>Social Club</span></h1>
    <p class="index-subtitle">Scan the QR code to register and start playing.</p>
    <div class="index-hint">
      <span>📱</span>
      <span>Scan the registration QR code to get started</span>
    </div>
    <div style="margin-top:1.5rem">
      <a href="/register" style="color:var(--primary);font-weight:600;font-size:1rem;text-decoration:underline">
        Or register here &rarr;
      </a>
    </div>
  </div>
</body>
</html>
