<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#a90096">
  <title>Register — PPSC</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lang-btn {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.45rem;
      background: none;
      border: 1.5px solid var(--on-surface-muted);
      border-radius: var(--radius-full);
      color: var(--on-surface-muted);
      text-transform: uppercase;
      cursor: pointer;
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
    .skill-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1rem 0;
      padding: 0.75rem 1rem;
      background: var(--surface-variant, #f5f0f5);
      border-radius: var(--radius-md);
    }
    .skill-display-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--on-surface-muted);
    }
    .avatar-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      cursor: pointer;
      margin: 0 auto 0.4rem;
      border: 2.5px solid transparent;
      box-shadow: 0 0 0 3px rgba(169,0,150,0.18);
      transition: box-shadow 0.15s;
    }
    .avatar-circle:hover {
      box-shadow: 0 0 0 4px rgba(169,0,150,0.35);
    }
    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar-circle-placeholder {
      font-size: 2rem;
      color: var(--on-primary);
    }
  </style>
</head>
<body>
  <div id="app" class="login-page">
    <button class="lang-btn" @click="toggleLocale">{{ $i18n.locale === 'de' ? 'EN' : 'DE' }}</button>
    <div class="login-card">
      <img src="/logo.png" alt="PPSC Logo" class="login-logo">
      <h1 class="login-title">{{ $t('welcome') }}</h1>
      <p class="login-subtitle">{{ $t('ppscFull') }}</p>

      <!-- ── Register form ──────────────────────────────────────────────────── -->
      <div v-if="view === 'register'">
        <form class="form-stack" @submit.prevent="submitRegister">
          <div class="form-group">
            <label class="form-label" for="player-name">{{ $t('yourName') }}</label>
            <input
              class="form-input"
              type="text"
              id="player-name"
              v-model="playerName"
              :placeholder="$t('namePlaceholder')"
              maxlength="20"
              required
              autofocus
              autocomplete="off"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="player-skill">{{ $t('skillLevel') }}</label>
            <select class="form-select" id="player-skill" v-model="playerSkill" required>
              <option value="">{{ $t('chooseDots') }}</option>
              <option value="beginner">{{ $t('beginner') }}</option>
              <option value="intermediate">{{ $t('intermediate') }}</option>
              <option value="advanced">{{ $t('advanced') }}</option>
            </select>
          </div>
          <div class="form-group" style="text-align:center">
            <div class="avatar-circle" @click="$refs.avatarInput.click()" :title="$t('photoOptional')">
              <img v-if="avatarDataUrl" :src="avatarDataUrl" alt="">
              <span v-else class="avatar-circle-placeholder">📷</span>
            </div>
            <div style="font-size:0.72rem;color:var(--on-surface-muted)">{{ $t('photoOptional') }}</div>
            <input ref="avatarInput" type="file" accept="image/*" capture="user" style="display:none" @change="handleAvatarFile">
          </div>
          <button class="btn btn-primary btn-full" type="submit" :disabled="submitting">
            {{ submitting ? $t('registering') : $t('registerBtn') }}
          </button>
        </form>
      </div>

      <!-- ── Welcome / logged-in view ──────────────────────────────────────── -->
      <div v-else>
        <div style="text-align:center;margin:1.5rem 0">
          <div class="avatar-circle" @click="$refs.avatarInput.click()" :title="$t('tapToChangePhoto')" style="margin-bottom:0.75rem">
            <img v-if="avatarDataUrl" :src="avatarDataUrl" alt="">
            <span v-else class="avatar-circle-placeholder">🏓</span>
          </div>
          <div style="font-size:0.72rem;color:var(--on-surface-muted);margin-bottom:0.75rem">{{ $t('tapToChangePhoto') }}</div>
          <input ref="avatarInput" type="file" accept="image/*" capture="user" style="display:none" @change="handleAvatarFile">
          <div class="title-md">{{ $t('welcomeBack', { name: registeredName }) }}</div>
          <p class="body-md text-muted" style="margin-top:0.5rem">
            {{ $t('youreRegistered') }}
          </p>
        </div>

        <!-- Skill display / edit -->
        <div v-if="!editingSkill" class="skill-display">
          <div>
            <div class="skill-display-label">{{ $t('yourLevel') }}</div>
            <span :class="['badge', 'badge--' + registeredSkill]" style="margin-top:0.25rem;display:inline-block">
              {{ $t('skillShort.' + registeredSkill) }}
            </span>
          </div>
          <button class="btn btn-ghost btn-sm" @click="editingSkill = true">{{ $t('changeSkill') }}</button>
        </div>
        <div v-else class="form-group" style="margin-bottom:1rem">
          <label class="form-label">{{ $t('skillLevel') }}</label>
          <select class="form-select" v-model="pendingSkill">
            <option value="beginner">{{ $t('beginner') }}</option>
            <option value="intermediate">{{ $t('intermediate') }}</option>
            <option value="advanced">{{ $t('advanced') }}</option>
          </select>
          <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
            <button class="btn btn-primary btn-sm" style="flex:1" @click="saveSkill">{{ $t('setSkill') }}</button>
            <button class="btn btn-secondary btn-sm" @click="editingSkill = false">{{ $t('cancel') }}</button>
          </div>
        </div>

        <button class="btn btn-secondary btn-full" @click="logout">{{ $t('logOut') }}</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-i18n@9/dist/vue-i18n.global.prod.js"></script>
  <script src="/js/i18n.js"></script>
  <script>
    const PLAYER_KEY = 'ppsc_player';

    const _savedLocale = localStorage.getItem('ppsc_locale') ||
      (navigator.language.startsWith('de') ? 'de' : 'en');

    const _i18n = VueI18n.createI18n({
      locale: _savedLocale,
      fallbackLocale: 'en',
      messages: PPSC_MESSAGES,
    });

    Vue.createApp({
      data() {
        return {
          view:           'register',
          playerName:     '',
          playerSkill:    '',
          registeredName: '',
          registeredSkill: '',
          submitting:     false,
          editingSkill:   false,
          pendingSkill:   '',
          avatarDataUrl:  '',
        };
      },

      methods: {
        toggleLocale() {
          const next = this.$i18n.locale === 'de' ? 'en' : 'de';
          this.$i18n.locale = next;
          localStorage.setItem('ppsc_locale', next);
          document.documentElement.lang = next;
        },

        getRegistration() {
          try { return JSON.parse(localStorage.getItem(PLAYER_KEY) || 'null'); } catch { return null; }
        },

        maybeRedirect() {
          const params = new URLSearchParams(window.location.search);
          const next = params.get('next');
          if (next && next.startsWith('/')) window.location.href = next;
        },

        handleAvatarFile(event) {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const SIZE = 128;
              const canvas = document.createElement('canvas');
              canvas.width = SIZE;
              canvas.height = SIZE;
              const ctx = canvas.getContext('2d');
              const min = Math.min(img.width, img.height);
              const sx = (img.width - min) / 2;
              const sy = (img.height - min) / 2;
              ctx.drawImage(img, sx, sy, min, min, 0, 0, SIZE, SIZE);
              this.avatarDataUrl = canvas.toDataURL('image/jpeg', 0.8);
              // Persist to existing registration if already saved
              const reg = this.getRegistration();
              if (reg) {
                localStorage.setItem(PLAYER_KEY, JSON.stringify({ ...reg, avatar: this.avatarDataUrl }));
              }
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
          event.target.value = '';
        },

        async submitRegister() {
          this.submitting = true;
          const name = this.playerName.trim();
          try {
            const res = await fetch('/register', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({ name }),
            });
            if (!res.ok) throw new Error(this.$t('registrationFailed'));
            const data = await res.json();
            localStorage.setItem(PLAYER_KEY, JSON.stringify({
              playerId: data.player_id,
              name:     data.name,
              skill:    this.playerSkill,
              avatar:   this.avatarDataUrl || undefined,
            }));
            this.registeredName  = data.name;
            this.registeredSkill = this.playerSkill;
            this.view = 'welcome';
            this.maybeRedirect();
          } catch (err) {
            alert(err.message);
          } finally {
            this.submitting = false;
          }
        },

        saveSkill() {
          const reg = this.getRegistration();
          if (!reg) return;
          const updated = { ...reg, skill: this.pendingSkill };
          localStorage.setItem(PLAYER_KEY, JSON.stringify(updated));
          this.registeredSkill = this.pendingSkill;
          this.editingSkill    = false;
        },

        async logout() {
          const reg = this.getRegistration();
          if (reg) {
            try {
              await fetch('/logout', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ player_id: reg.playerId }),
              });
            } catch {}
          }
          const toRemove = [];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('ppsc_')) toRemove.push(key);
          }
          toRemove.forEach(k => localStorage.removeItem(k));
          this.view        = 'register';
          this.playerName  = '';
          this.playerSkill = '';
        },
      },

      async mounted() {
        document.documentElement.lang = this.$i18n.locale;
        const reg = this.getRegistration();
        if (!reg) return;

        try {
          const res  = await fetch('/register/check/' + encodeURIComponent(reg.playerId));
          const data = await res.json();
          if (data.valid) {
            this.registeredName  = data.name;
            this.registeredSkill = reg.skill || '';
            this.pendingSkill    = reg.skill || 'beginner';
            this.avatarDataUrl   = reg.avatar || '';
            // If skill wasn't set yet, prompt immediately
            this.editingSkill    = !reg.skill;
            this.view = 'welcome';
            this.maybeRedirect();
            return;
          }
        } catch {}

        localStorage.removeItem(PLAYER_KEY);
      },
    }).use(_i18n).mount('#app');
  </script>
</body>
</html>
