<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#a90096">
  <title>Admin — PPSC</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--on-surface-muted);
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: livePulse 2s ease-in-out infinite;
    }
    .lang-btn {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.45rem;
      background: none;
      border: 1.5px solid var(--on-surface-muted);
      border-radius: var(--radius-full);
      color: var(--on-surface-muted);
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    #create-error {
      color: var(--error);
      font-size: 0.85rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div id="app" class="admin-layout">

    <!-- ── Header ──────────────────────────────────────────────────────────── -->
    <header class="admin-header glass">
      <img src="/logo.png" alt="PPSC" class="logo">
      <span class="site-name">Ping Pong Social Club</span>
      <div class="live-indicator">
        <div class="live-dot" :style="{ background: liveDotColor }"></div>
        <span>{{ $t('live') }}</span>
      </div>
      <div class="header-actions">
        <button class="lang-btn" @click="toggleLocale">{{ $i18n.locale === 'de' ? 'EN' : 'DE' }}</button>
        <a href="/admin/qr" class="btn btn-ghost btn-sm">{{ $t('qrCodesLink') }}</a>
        <a href="/admin/logout" class="btn btn-secondary btn-sm">{{ $t('logOutAdmin') }}</a>
      </div>
    </header>

    <!-- ── Main ────────────────────────────────────────────────────────────── -->
    <main class="admin-main">
      <div class="admin-page-header">
        <div>
          <h1 class="admin-page-title">{{ $t('tables') }}</h1>
          <p class="body-sm" style="margin-top:0.25rem">
            {{ $t('tablesActive', { count: tableCount }) }}
          </p>
        </div>
        <button class="btn btn-primary" @click="openCreateModal">{{ $t('addTable') }}</button>
      </div>

      <!-- Tables grid -->
      <div id="tables-container">

        <!-- Loading -->
        <div v-if="!initialLoaded" style="padding:3rem;text-align:center;color:var(--on-surface-muted)">
          {{ $t('loadingTables') }}
        </div>

        <!-- Empty state -->
        <div class="tables-grid" v-else-if="tableList.length === 0">
          <button class="add-table-card" @click="openCreateModal">
            <div class="add-table-icon">+</div>
            <div class="add-table-label">{{ $t('addYourFirstTable') }}</div>
          </button>
        </div>

        <!-- Table cards -->
        <div class="tables-grid" v-else>
          <table-card
            v-for="table in tableList"
            :key="table.id"
            :table="table"
          ></table-card>
          <button class="add-table-card" @click="openCreateModal">
            <div class="add-table-icon">+</div>
            <div class="add-table-label">{{ $t('addTableLabel') }}</div>
          </button>
        </div>

      </div>
    </main>

  <!-- ── Create Table Modal ──────────────────────────────────────────────────── -->
  <div :class="['modal-overlay', showModal ? '' : 'hidden']"
    role="dialog" aria-modal="true"
    @click.self="closeCreateModal">
    <div class="modal">
      <h2 class="modal-title">{{ $t('addNewTable') }}</h2>
      <form class="form-stack" @submit.prevent="submitCreateTable">
        <div class="form-group">
          <label class="form-label">{{ $t('tableName') }}</label>
          <input class="form-input" type="text" v-model="form.name"
            :placeholder="$t('tableNamePlaceholder')" maxlength="50" required
            ref="nameInput">
        </div>
        <div class="form-group">
          <label class="form-label">{{ $t('type') }}</label>
          <select class="form-select" v-model="form.type" required>
            <option value="">{{ $t('chooseDots') }}</option>
            <option value="singles">{{ $t('singles') }}</option>
            <option value="doubles">{{ $t('doubles') }}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">{{ $t('playMode') }}</label>
          <select class="form-select" v-model="form.playMode" required>
            <option value="rotation">{{ $t('rotationMode') }}</option>
            <option value="winner_stays">{{ $t('winnerStaysMode') }}</option>
          </select>
        </div>
        <div class="form-group" v-if="form.playMode === 'winner_stays'">
          <label class="form-label">{{ $t('maxWins') }}</label>
          <input class="form-input" type="number" v-model.number="form.maxWins"
            value="3" min="1" max="10" step="1">
          <span class="body-sm">{{ $t('maxWinsDesc') }}</span>
        </div>
        <div class="form-group">
          <label class="form-label">
            {{ $t('tableIdLabel') }}
            <span class="text-muted" style="font-weight:400;text-transform:none;letter-spacing:0">
              {{ $t('tableIdAuto') }}
            </span>
          </label>
          <input class="form-input" type="text" v-model="form.id"
            placeholder="e.g. table-1" maxlength="50"
            pattern="[a-z0-9-]+"
            :title="$t('tableIdHint')"
            @input="form.idManuallyEdited = true">
        </div>
        <div id="create-error">{{ createError }}</div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" @click="closeCreateModal">{{ $t('cancel') }}</button>
          <button type="submit" class="btn btn-primary" :disabled="createSubmitting">{{ $t('createTable') }}</button>
        </div>
      </form>
    </div>
  </div>

  </div><!-- end #app -->

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-i18n@9/dist/vue-i18n.global.prod.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
